<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO defaults (overridden per-page by react-helmet-async) -->
    <title>myMag — AI-Powered Magazine Creator</title>
    <meta
      name="description"
      content="myMag — Create personalized, professionally printed magazines in minutes with AI. From Zurich, for the world."
    />
    <meta
      name="robots"
      content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1"
    />
    <link rel="canonical" href="https://mymag.app/" />
    <meta name="theme-color" content="#4a90d9" />
    <meta name="author" content="myMag" />

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="myMag" />
    <meta property="og:title" content="myMag — AI-Powered Magazine Creator" />
    <meta
      property="og:description"
      content="Create personalized, professionally printed magazines in minutes with AI. From Zurich, for the world."
    />
    <meta property="og:image" content="https://mymag.app/og.png" />
    <meta property="og:url" content="https://mymag.app/" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@mymag" />
    <meta name="twitter:title" content="myMag — AI-Powered Magazine Creator" />
    <meta
      name="twitter:description"
      content="Create personalized magazines in minutes with AI."
    />
    <meta name="twitter:image" content="https://mymag.app/og.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&family=Plus+Jakarta+Sans:ital,wght@0,500..700;1,500..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
